name: Deploy Documentation to GitHub Pages

on:
  push:
    branches:
      - main
    paths:
      - 'site-docs/**'
      - 'docs/**'
      - '_bmad-output/planning-artifacts/**'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install mkdocs mkdocs-material

      - name: Sync docs to site-docs
        run: |
          # Copy project docs (strip YAML frontmatter)
          for f in docs/*.md; do
            fname=$(basename "$f")
            sed '/^---$/,/^---$/d' "$f" > "site-docs/docs/project/$fname"
          done

          # Copy planning artifacts (strip YAML frontmatter)
          for f in _bmad-output/planning-artifacts/*.md; do
            fname=$(basename "$f")
            sed '/^---$/,/^---$/d' "$f" > "site-docs/docs/planning/$fname"
          done

      - name: Build MkDocs site
        run: cd site-docs && mkdocs build

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site-docs/site

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
