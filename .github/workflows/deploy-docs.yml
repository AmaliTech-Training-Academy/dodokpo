name: Deploy Documentation to GitHub Pages

on:
  push:
    branches:
      - main
    paths:
      - 'site-docs/**'
      - 'docs/**'
      - '_bmad-output/planning-artifacts/**'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install mkdocs mkdocs-material

      - name: Sync docs to site-docs
        run: |
          # Strip only YAML frontmatter (first --- block), preserve all other --- in content
          python3 << 'PYEOF'
          import os, glob

          def strip_frontmatter(content):
              if content.startswith('---'):
                  end = content.find('---', 3)
                  if end != -1:
                      return content[end+3:].lstrip('\n')
              return content

          # Project docs
          for f in glob.glob('docs/*.md'):
              fname = os.path.basename(f)
              with open(f) as fh:
                  content = strip_frontmatter(fh.read())
              with open(f'site-docs/docs/project/{fname}', 'w') as out:
                  out.write(content)

          # Planning artifacts (exclude validation report)
          for f in glob.glob('_bmad-output/planning-artifacts/*.md'):
              fname = os.path.basename(f)
              if 'validation' in fname:
                  continue
              with open(f) as fh:
                  content = strip_frontmatter(fh.read())
              with open(f'site-docs/docs/planning/{fname}', 'w') as out:
                  out.write(content)
          PYEOF

      - name: Build MkDocs site
        run: cd site-docs && mkdocs build

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site-docs/site

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
